<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Administrator - Nedha Control Center</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- FontAwesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    html {
      font-size: 18px;
    }

    :root {
      --primary: #2E7D32;
      --primary-light: #A5D6A7;
      --accent: #FF7043;
      --accent-hover: #E64A19;
      --bg-cream: #F9F8F3;
      --text-dark: #2C3E2F;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', 'Inter', sans-serif;
    }

    body {
      background: radial-gradient(circle at 10% 20%, #1b5e20 0%, #2e7d32 40%, #f5f2eb 100%);
      background-size: cover;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Subtle Batik SVG Overlay Pattern Background */
    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60"><path d="M30 0 L60 30 L30 60 L0 30 Z" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1.5"/></svg>');
      background-repeat: repeat;
      pointer-events: none;
      z-index: 1;
    }

    /* Decorative Floating Blurs */
    .blur-circle {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
      opacity: 0.45;
    }

    .circle-1 {
      top: -100px;
      left: -100px;
      width: 400px;
      height: 400px;
      background: #81C784;
    }

    .circle-2 {
      bottom: -150px;
      right: -100px;
      width: 500px;
      height: 500px;
      background: #FF8A65;
    }

    /* Glassmorphism Card Container */
    .login-container {
      width: 100%;
      max-width: 460px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 28px;
      padding: 50px 40px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
      text-align: center;
      z-index: 10;
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Logo & Header */
    .brand-logo-wrap {
      width: 90px;
      height: 90px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 20px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 16px rgba(0,0,0,0.1);
      transition: transform 0.4s ease;
    }

    .brand-logo-wrap:hover {
      transform: rotate(10deg) scale(1.05);
    }

    .brand-logo {
      width: 55px;
      height: 55px;
      object-fit: contain;
    }

    .brand-logo-fallback {
      font-size: 2.5rem;
      color: #FFF;
    }

    .login-title {
      font-size: 2.1rem;
      font-weight: 700;
      color: #FFFFFF;
      margin-bottom: 5px;
      letter-spacing: 1px;
    }

    .login-subtitle {
      font-size: 0.95rem;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 35px;
      font-style: italic;
    }

    /* Form Styles */
    .form-group {
      position: relative;
      margin-bottom: 22px;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.85);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.6);
      font-size: 1.15rem;
      transition: color 0.3s;
    }

    .form-control {
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 15px 18px 15px 48px;
      color: #FFFFFF;
      font-size: 1.05rem;
      font-weight: 400;
      outline: none;
      transition: all 0.3s ease;
    }

    .form-control::placeholder {
      color: rgba(255, 255, 255, 0.45);
    }

    .form-control:focus {
      background: rgba(255, 255, 255, 0.14);
      border-color: var(--primary-light);
      box-shadow: 0 0 10px rgba(165, 214, 167, 0.4);
    }

    .form-control:focus + .input-icon {
      color: var(--primary-light);
    }

    /* Error Alert */
    .error-alert {
      background: rgba(239, 83, 80, 0.2);
      border: 1px solid rgba(239, 83, 80, 0.4);
      border-radius: 12px;
      padding: 12px 15px;
      color: #FFCDD2;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: shake 0.5s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }

    /* Submit Button */
    .btn-login {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
      border: none;
      border-radius: 12px;
      color: #FFFFFF;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(230, 74, 25, 0.35);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(230, 74, 25, 0.5);
    }

    .btn-login:active {
      transform: translateY(1px);
    }

    /* Links */
    .back-home {
      display: inline-block;
      margin-top: 30px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.95rem;
      text-decoration: none;
      transition: color 0.3s;
    }

    .back-home:hover {
      color: #FFFFFF;
    }

    .back-home i {
      margin-right: 5px;
    }
  </style>
</head>
<body>

  <!-- Floating Blurs Background -->
  <div class="blur-circle circle-1"></div>
  <div class="blur-circle circle-2"></div>

  <!-- Login Card Container -->
  <div class="login-container">
    
    <!-- Logo -->
    <div class="brand-logo-wrap">
      <img src="/images/logo.png" alt="Nedha Logo" class="brand-logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
      <i class="fa-solid fa-seedling brand-logo-fallback" style="display: none;"></i>
    </div>

    <h1 class="login-title">Control Center</h1>
    <p class="login-subtitle">Nedha - Mangan Enak, Awak Kepenak.</p>

    <!-- Error Toast Message (rendered dynamically if error param is active) -->
    <div id="errorAlert" class="error-alert" style="display: none;">
      <i class="fa-solid fa-circle-exclamation"></i>
      <span>Username atau Password Anda salah.</span>
    </div>

    <!-- Login Form -->
    <form action="/login" method="POST">
      
      <div class="form-group">
        <label for="username">Nama Pengguna (Username)</label>
        <div class="input-wrapper">
          <input type="text" id="username" name="username" class="form-control" required placeholder="Masukkan username admin" autocomplete="username">
          <i class="fa-solid fa-user input-icon"></i>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Kata Sandi (Password)</label>
        <div class="input-wrapper">
          <input type="password" id="password" name="password" class="form-control" required placeholder="Masukkan password admin" autocomplete="current-password">
          <i class="fa-solid fa-lock input-icon"></i>
        </div>
      </div>

      <button type="submit" class="btn-login">
        Masuk Dashboard <i class="fa-solid fa-arrow-right"></i>
      </button>

    </form>

    <a href="/" class="back-home">
      <i class="fa-solid fa-arrow-left"></i> Kembali ke Halaman Utama
    </a>

  </div>

  <script>
    // Check for error parameters in the URL
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('error') === 'credentials') {
        const alertBox = document.getElementById('errorAlert');
        if (alertBox) {
          alertBox.style.display = 'flex';
        }
      }
    });
  </script>

</body>
</html>
